<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AF8 Resilience Kit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-blue { 0%, 100% { color: #94a3b8; } 50% { color: #2563eb; transform: scale(1.1); } }
        .animate-guide { animation: pulse-blue 2s infinite; }
        @keyframes pulse-red { 0%, 100% { background-color: #dc2626; } 50% { background-color: #ef4444; } }
        .animate-alert { animation: pulse-red 1.5s infinite; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 font-sans text-slate-900 pb-12">

    <div id="app" class="max-w-md mx-auto space-y-6">
        
        <div class="flex flex-col items-center pt-6">
            <div class="bg-white p-2 rounded-full shadow-md overflow-hidden h-20 w-20 flex items-center justify-center border border-slate-200">
                <img src="Logo.png" alt="Logo" class="max-w-full h-auto">
            </div>
            
            <header id="statusCard" class="w-full mt-4 bg-white p-6 rounded-3xl shadow-sm border border-slate-200 relative overflow-hidden">
                <div id="overdueAlert" class="hidden absolute top-0 left-0 w-full animate-alert text-white text-[9px] font-black uppercase tracking-widest py-1 text-center">
                    ⚠️ Maintenance Overdue ⚠️
                </div>

                <button id="editToggle" onclick="toggleEdit()" class="absolute top-4 right-4 text-slate-300 hover:text-blue-500 text-[10px] font-black uppercase tracking-widest transition-colors">Edit</button>
                
                <div id="headerLoading" class="animate-pulse space-y-2 py-4 text-center">
                    <div class="h-6 w-3/4 bg-slate-100 mx-auto rounded"></div>
                    <p class="text-[10px] font-black uppercase text-slate-400 tracking-widest italic">Checking Registry...</p>
                </div>

                <div id="headerContent" class="hidden text-center space-y-3 pt-2">
                    <div id="viewMode">
                        <h1 id="boxName" class="text-2xl font-black italic uppercase tracking-tighter text-slate-800">...</h1>
                        <p id="boxLoc" class="text-slate-400 font-bold text-[10px] uppercase tracking-widest">📍 ...</p>
                    </div>
                    
                    <div id="editMode" class="hidden space-y-3 pb-2 text-left">
                        <p class="text-[10px] font-black uppercase text-blue-600 tracking-widest text-center">Kit Registration</p>
                        <input type="text" id="editName" placeholder="Nickname (e.g. Hallway Box)" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold text-center outline-none focus:ring-2 focus:ring-blue-500">
                        <select id="editLoc" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold text-center outline-none appearance-none">
                            <option value="" disabled selected>Select Neighborhood</option>
                            <option value="Queenstown Central">Queenstown Central</option>
                            <option value="Fernhill / Sunshine Bay">Fernhill / Sunshine Bay</option>
                            <option value="Frankton">Frankton</option>
                            <option value="Hanley's Farm / Jack's Point">Hanley's Farm / Jack's Point</option>
                            <option value="Shotover Country / Lake Hayes Estate">Shotover Country / Lake Hayes Estate</option>
                            <option value="Arrowtown">Arrowtown</option>
                            <option value="Arthurs Point">Arthurs Point</option>
                        </select>
                        <button id="saveBtn" onclick="saveChanges()" class="w-full p-4 bg-blue-600 text-white rounded-xl font-black text-[10px] uppercase tracking-widest shadow-lg active:bg-blue-700 transition-all">Activate My Kit</button>
                    </div>

                    <div id="meterContainer" class="space-y-1">
                        <div class="flex justify-between items-end px-1">
                            <span class="text-[9px] font-black text-slate-400 uppercase tracking-tighter">Kit Readiness</span>
                            <span id="healthPercent" class="text-[10px] font-black text-slate-700">0%</span>
                        </div>
                        <div class="w-full h-2.5 bg-slate-100 rounded-full overflow-hidden border border-slate-50">
                            <div id="healthBar" class="h-full bg-slate-300 transition-all duration-1000" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </header>
        </div>

        <div id="mainAppContent" class="hidden space-y-6">
            
            <section class="space-y-3">
                <h2 class="text-[10px] font-black uppercase text-slate-400 tracking-widest px-2">Rotation Items</h2>
                <button id="btnWater" onclick="triggerCheckin('Water', 'btnWater')" class="w-full flex items-center gap-4 p-5 bg-blue-600 text-white rounded-3xl shadow-lg active:scale-95 transition-all">
                    <span class="text-3xl">💧</span>
                    <div class="text-left flex-1">
                        <p class="font-black text-lg label leading-tight">Water is Fresh</p>
                        <p class="text-[10px] font-bold opacity-70 italic sub">Checking status...</p>
                    </div>
                </button>
                <button id="btnFood" onclick="triggerCheckin('Food', 'btnFood')" class="w-full flex items-center gap-4 p-5 bg-orange-500 text-white rounded-3xl shadow-lg active:scale-95 transition-all">
                    <span class="text-3xl">🥫</span>
                    <div class="text-left flex-1">
                        <p class="font-black text-lg label leading-tight">Food is In-Date</p>
                        <p class="text-[10px] font-bold opacity-70 italic sub">Checking status...</p>
                    </div>
                </button>
            </section>

            <div class="py-2">
                <div class="bg-slate-200/60 rounded-2xl py-3 px-4 flex flex-col items-center justify-center space-y-1 border border-slate-200/50">
                    <p id="lastCheck" class="text-[11px] font-black text-slate-700 uppercase tracking-widest text-center italic">
                        Connecting...
                    </p>
                    <div id="syncDot" class="h-1.5 w-1.5 rounded-full bg-slate-300"></div>
                </div>
            </div>

            <section class="bg-white rounded-3xl p-6 shadow-sm border border-slate-200 space-y-5">
                <h2 class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Essential Gear</h2>
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3"><span class="text-xl">🩹</span><span class="font-bold text-sm text-slate-700">First Aid Kit</span></div>
                    <input type="checkbox" id="checkFirstAid" onchange="toggleGear('FirstAid', this.checked)" class="w-6 h-6 rounded-full accent-green-600">
                </div>
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3"><span class="text-xl">🧼</span><span class="font-bold text-sm text-slate-700">Hygiene Items</span></div>
                    <input type="checkbox" id="checkHygiene" onchange="toggleGear('Hygiene', this.checked)" class="w-6 h-6 rounded-full accent-green-600">
                </div>
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3"><span class="text-xl">🔦</span><span class="font-bold text-sm text-slate-700">Torch & Batteries</span></div>
                    <input type="checkbox" id="checkTorch" onchange="toggleGear('Torch', this.checked)" class="w-6 h-6 rounded-full accent-green-600">
                </div>
            </section>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxCa1W_pzFtu2PC4_Im23F7K1otvdrhwugfTcaqZjs-n8vNtjZZv6Xcm4ulz6lhlJA/exec"; 
        const urlParams = new URLSearchParams(window.location.search);
        const boxId = urlParams.get('id') || "UNSET";
        
        let currentBoxData = {}; 

        function timeAgo(dateString) {
            if (!dateString) return "Never Checked";
            const days = Math.floor((new Date() - new Date(dateString)) / (1000*60*60*24));
            if (days === 0) return "Checked Today";
            if (days === 1) return "Checked Yesterday";
            if (days < 30) return `Checked ${days} days ago`;
            if (days < 365) return `Checked ${Math.floor(days/30)} months ago`;
            return `Checked ${Math.floor(days/365)} years ago`;
        }

        async function init() {
            if (boxId === "UNSET") {
                document.getElementById('headerLoading').innerHTML = "<p class='text-red-500 font-black text-[10px] uppercase py-4'>⚠️ No Box ID Found</p>";
                return;
            }
            try {
                const res = await fetch(`${SCRIPT_URL}?id=${boxId}`);
                const data = await res.json();
                currentBoxData = data; 

                if (!data.existsInRegistry) {
                    document.getElementById('headerLoading').innerHTML = "<p class='text-red-500 font-black text-[10px] uppercase py-4'>❌ ID Not Authorized</p>";
                    return;
                }

                document.getElementById('headerLoading').classList.add('hidden');
                document.getElementById('headerContent').classList.remove('hidden');

                if (data.name) {
                    // ALREADY REGISTERED: Show everything
                    document.getElementById('boxName').innerText = data.name;
                    document.getElementById('boxLoc').innerText = `📍 ${data.location}`;
                    document.getElementById('checkFirstAid').checked = data.hasFirstAid;
                    document.getElementById('checkHygiene').checked = data.hasHygiene;
                    document.getElementById('checkTorch').checked = data.hasTorch;
                    
                    document.getElementById('mainAppContent').classList.remove('hidden');
                    updateHealthUI(currentBoxData); 
                    document.getElementById('syncDot').classList.replace('bg-slate-300', 'bg-green-500');
                } else {
                    // NEW BOX: Force Registration
                    document.getElementById('editToggle').classList.add('hidden'); // Hide the X/Edit button
                    document.getElementById('viewMode').classList.add('hidden');
                    document.getElementById('meterContainer').classList.add('hidden');
                    document.getElementById('editMode').classList.remove('hidden');
                }
            } catch (e) { console.error(e); }
        }

        function updateHealthUI(data) {
            const healthBar = document.getElementById('healthBar');
            const healthText = document.getElementById('healthPercent');
            const alertBanner = document.getElementById('overdueAlert');
            const statusLabel = document.getElementById('lastCheck');

            let waterScore = 0;
            const waterBtn = document.querySelector('#btnWater .label');
            const waterSub = document.querySelector('#btnWater .sub');

            if (data.lastWater) {
                const days = Math.floor((new Date() - new Date(data.lastWater)) / (1000*60*60*24));
                waterScore = days <= 150 ? 33.3 : (days <= 180 ? 16.6 : 0);
                waterBtn.innerText = days > 180 ? "Replace Water" : "Water is Fresh";
                waterSub.innerText = timeAgo(data.lastWater);
                document.getElementById('btnWater').className = days > 180 
                    ? "w-full flex items-center gap-4 p-5 bg-red-500 text-white rounded-3xl shadow-lg active:scale-95 transition-all animate-pulse"
                    : "w-full flex items-center gap-4 p-5 bg-blue-600 text-white rounded-3xl shadow-lg active:scale-95 transition-all";
            }

            let foodScore = 0;
            const foodBtn = document.querySelector('#btnFood .label');
            const foodSub = document.querySelector('#btnFood .sub');
            
            if (data.lastFood) {
                const days = Math.floor((new Date() - new Date(data.lastFood)) / (1000*60*60*24));
                foodScore = days <= 150 ? 33.3 : (days <= 180 ? 16.6 : 0);
                foodBtn.innerText = days > 180 ? "Check Expiries" : "Food is In-Date";
                foodSub.innerText = timeAgo(data.lastFood);
                document.getElementById('btnFood').className = days > 180 
                    ? "w-full flex items-center gap-4 p-5 bg-red-500 text-white rounded-3xl shadow-lg active:scale-95 transition-all animate-pulse"
                    : "w-full flex items-center gap-4 p-5 bg-orange-500 text-white rounded-3xl shadow-lg active:scale-95 transition-all";
            }

            const gearItems = [data.hasFirstAid, data.hasHygiene, data.hasTorch];
            const checkedCount = gearItems.filter(Boolean).length;
            let gearScore = (checkedCount / 3) * 33.4;

            const totalScore = Math.round(waterScore + foodScore + gearScore);
            healthBar.style.width = `${totalScore}%`;
            healthText.innerText = `${totalScore}%`;

            if (totalScore >= 99) {
                healthBar.className = "h-full bg-green-500 transition-all duration-1000";
                alertBanner.classList.add('hidden');
                statusLabel.innerText = "Kit Fully Ready ✓";
            } else if (totalScore > 60) {
                healthBar.className = "h-full bg-orange-500 transition-all duration-1000";
                alertBanner.classList.add('hidden');
                statusLabel.innerText = "Minor Updates Required";
            } else {
                healthBar.className = "h-full bg-red-600 transition-all duration-1000";
                alertBanner.classList.remove('hidden');
                statusLabel.innerText = "Action Required Below";
            }
        }

        function toggleEdit() {
            const isViewing = !document.getElementById('viewMode').classList.contains('hidden');
            if (isViewing) {
                document.getElementById('editName').value = document.getElementById('boxName').innerText;
                document.getElementById('viewMode').classList.add('hidden');
                document.getElementById('editMode').classList.remove('hidden');
            } else {
                document.getElementById('viewMode').classList.remove('hidden');
                document.getElementById('editMode').classList.add('hidden');
            }
        }

        async function saveChanges() {
            const btn = document.getElementById('saveBtn');
            const newName = document.getElementById('editName').value;
            const newLoc = document.getElementById('editLoc').value;

            if (!newName || !newLoc) {
                alert("Please provide a name and location to activate your kit.");
                return;
            }

            btn.innerText = "ACTIVATING...";
            btn.disabled = true;

            await fetch(SCRIPT_URL, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({ action: 'update', boxId: boxId, name: newName, location: newLoc })
            });

            // Update local data and UI
            currentBoxData.name = newName;
            currentBoxData.location = newLoc;
            
            document.getElementById('boxName').innerText = newName;
            document.getElementById('boxLoc').innerText = `📍 ${newLoc}`;
            
            // Unlock the app
            document.getElementById('editToggle').classList.remove('hidden');
            document.getElementById('viewMode').classList.remove('hidden');
            document.getElementById('meterContainer').classList.remove('hidden');
            document.getElementById('mainAppContent').classList.remove('hidden');
            document.getElementById('editMode').classList.add('hidden');
            
            btn.innerText = "Save Details";
            btn.disabled = false;
            updateHealthUI(currentBoxData);
            document.getElementById('syncDot').classList.replace('bg-slate-300', 'bg-green-500');
            document.getElementById('lastCheck').innerText = "Kit Activated! ✓";
        }

        async function triggerCheckin(category, btnId) {
            const btn = document.getElementById(btnId);
            const label = btn.querySelector('.label');
            const sub = btn.querySelector('.sub');
            label.innerText = "SYNCING...";
            sub.innerText = "Please wait...";
            await fetch(SCRIPT_URL, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({ action: 'checkin', boxId: boxId, category: category })
            });
            if (category === 'Water') currentBoxData.lastWater = new Date().toISOString();
            if (category === 'Food') currentBoxData.lastFood = new Date().toISOString();
            updateHealthUI(currentBoxData); 
            document.getElementById('lastCheck').innerText = "Rotation Logged ✓";
        }

        async function toggleGear(item, state) {
            document.getElementById('lastCheck').innerText = `SAVING ${item.toUpperCase()}...`;
            await fetch(SCRIPT_URL, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({ action: 'updateGear', boxId: boxId, item: item, state: state })
            });
            currentBoxData[`has${item}`] = state;
            updateHealthUI(currentBoxData);
            document.getElementById('lastCheck').innerText = "Gear State Saved ✓";
        }

        window.onload = init;
    </script>
</body>
</html>
