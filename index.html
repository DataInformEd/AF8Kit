<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AF8 Resilience Kit</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 font-sans text-slate-900">

    <div id="app" class="max-w-md mx-auto space-y-6 pt-4">
        
        <header id="statusCard" class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
            <div id="headerLoading" class="animate-pulse space-y-3">
                <div class="h-8 w-3/4 bg-slate-200 rounded-lg"></div>
                <div class="h-4 w-1/2 bg-slate-100 rounded-lg"></div>
            </div>
            
            <div id="headerContent" class="hidden">
                <h1 id="boxName" class="text-3xl font-black italic uppercase tracking-tighter text-slate-800">My Box</h1>
                <p id="boxLoc" class="text-slate-500 font-bold flex items-center gap-1">📍 <span id="locText">...</span></p>
                <div id="lastCheck" class="mt-4 inline-block px-3 py-1 bg-slate-100 rounded-full text-[10px] font-black uppercase text-slate-500 tracking-widest">
                    Syncing...
                </div>
            </div>
        </header>

        <main id="mainActions" class="space-y-4">
            <button id="btnWater" onclick="triggerAction('Water', 'btnWater')" class="w-full flex items-center gap-4 p-6 bg-blue-600 text-white rounded-3xl shadow-lg active:scale-95 transition-all disabled:opacity-50">
                <span class="text-4xl icon">💧</span>
                <div class="text-left">
                    <p class="font-black text-xl leading-tight label">Water is Fresh</p>
                    <p class="text-xs opacity-70 italic font-medium sub">Tap to verify</p>
                </div>
            </button>

            <button id="btnFood" onclick="triggerAction('Food', 'btnFood')" class="w-full flex items-center gap-4 p-6 bg-orange-500 text-white rounded-3xl shadow-lg active:scale-95 transition-all disabled:opacity-50">
                <span class="text-4xl icon">🥫</span>
                <div class="text-left">
                    <p class="font-black text-xl leading-tight label">Food is In-Date</p>
                    <p class="text-xs opacity-70 italic font-medium sub">Tap to verify</p>
                </div>
            </button>
            <p id="feedbackMsg" class="text-center text-sm font-bold text-green-600 hidden">✓ Cloud Synced</p>
        </main>

        <section id="regForm" class="hidden bg-white p-6 rounded-3xl shadow-xl border-2 border-blue-500 space-y-4">
            <h2 class="text-xl font-black italic uppercase">Register Kit</h2>
            <input type="text" id="newName" placeholder="Kit Nickname" class="w-full p-4 bg-slate-100 rounded-xl font-bold outline-none">
            <input type="text" id="newLoc" placeholder="Where is it stored?" class="w-full p-4 bg-slate-100 rounded-xl font-bold outline-none">
            <button onclick="manageKit('register')" class="w-full p-4 bg-black text-white rounded-xl font-black uppercase tracking-widest">Activate Kit</button>
        </section>

        <footer class="pt-8">
            <details class="group bg-white rounded-2xl border border-slate-200 overflow-hidden">
                <summary class="p-4 font-bold text-slate-400 text-sm cursor-pointer hover:bg-slate-50 flex justify-between items-center list-none">
                    MANAGE KIT SETTINGS <span>▼</span>
                </summary>
                <div class="p-2 space-y-1 border-t border-slate-100 bg-slate-50">
                    <button onclick="manageKit('update')" class="w-full text-left p-3 hover:bg-white rounded-lg font-bold text-slate-700">✏️ Change Name/Location</button>
                    <button onclick="manageKit('delete')" class="w-full text-left p-3 hover:bg-red-50 rounded-lg font-bold text-red-600">🗑️ Delete Box Connection</button>
                </div>
            </details>
        </footer>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxCa1W_pzFtu2PC4_Im23F7K1otvdrhwugfTcaqZjs-n8vNtjZZv6Xcm4ulz6lhlJA/exec";
        const urlParams = new URLSearchParams(window.location.search);
        const boxId = urlParams.get('id') || "UNSET";

        async function init() {
            if (boxId === "UNSET") return;
            const res = await fetch(`${SCRIPT_URL}?id=${boxId}`);
            const data = await res.json();
            document.getElementById('headerLoading').classList.add('hidden');
            if (!data.registered) {
                document.getElementById('mainActions').classList.add('hidden');
                document.getElementById('regForm').classList.remove('hidden');
            } else {
                document.getElementById('headerContent').classList.remove('hidden');
                document.getElementById('boxName').innerText = data.name;
                document.getElementById('locText').innerText = data.location;
                document.getElementById('lastCheck').innerText = data.lastCheck ? `Last Check: ${new Date(data.lastCheck).toLocaleDateString()}` : "Never Checked";
            }
        }

        async function triggerAction(category, btnId) {
            const btn = document.getElementById(btnId);
            const originalLabel = btn.querySelector('.label').innerText;
            
            // Immediate Feedback
            btn.disabled = true;
            btn.querySelector('.label').innerText = "Syncing...";
            btn.querySelector('.sub').innerText = "Please wait...";

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST', mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ action: 'checkin', boxId: boxId, category: category })
                });
                
                document.getElementById('feedbackMsg').classList.remove('hidden');
                document.getElementById('lastCheck').innerText = "Checked Just Now ✓";
            } finally {
                setTimeout(() => {
                    btn.disabled = false;
                    btn.querySelector('.label').innerText = originalLabel;
                    btn.querySelector('.sub').innerText = "Tap to verify";
                }, 2000);
            }
        }

        async function manageKit(type) {
            let body = { action: type, boxId: boxId };

            if (type === 'delete' && !confirm("Permanently delete this box connection?")) return;
            
            if (type === 'update') {
                body.name = prompt("New Name:", document.getElementById('boxName').innerText);
                body.location = prompt("New Location:", document.getElementById('locText').innerText);
                if (!body.name || !body.location) return;
            }

            if (type === 'register') {
                body.name = document.getElementById('newName').value;
                body.location = document.getElementById('newLoc').value;
            }

            await fetch(SCRIPT_URL, {
                method: 'POST', mode: 'no-cors',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(body)
            });
            
            alert("Updated! Refreshing...");
            location.reload();
        }

        window.onload = init;
    </script>
</body>
</html>
