<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-6">
    <div class="max-w-md mx-auto text-center">
        <h1 class="text-3xl font-bold mb-4">📦 Resilience Check</h1>
        
        <button onclick="sendData('Water')" class="w-full mb-4 p-4 bg-blue-500 text-white rounded-xl font-bold">💧 Water is Fresh</button>
        <button onclick="sendData('Food')" class="w-full p-4 bg-orange-500 text-white rounded-xl font-bold">🥫 Food is In-Date</button>

        <p id="msg" class="mt-4 text-green-600 font-medium hidden">Saved to cloud!</p>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxCa1W_pzFtu2PC4_Im23F7K1otvdrhwugfTcaqZjs-n8vNtjZZv6Xcm4ulz6lhlJA/exec";

async function sendData(category) {
    const msg = document.getElementById('msg');
    
    // We must use 'text/plain' and 'no-cors' to bypass the CORS wall
    try {
        await fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors', 
            headers: {
                'Content-Type': 'text/plain',
            },
            body: JSON.stringify({ 
                boxId: "101", 
                category: category 
            })
        });

        // NOTE: Because of 'no-cors', the browser won't let us read the response.
        // We just have to assume it worked and check the Google Sheet!
        msg.innerText = "✓ Check Sent! (Refresh your Sheet)";
        msg.classList.remove('hidden');
        msg.style.color = "green";
        setTimeout(() => msg.classList.add('hidden'), 5000);
        
    } catch (error) {
        console.error("Fetch Error:", error);
        msg.innerText = "Error - Check Console";
        msg.classList.remove('hidden');
        msg.style.color = "red";
    }
}
        
    </script>
</body>
</html>
